<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake">
  <meta name="theme-color" content="#050510">
  <link rel="manifest" href="manifest.json">
  <title>Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background: #050510;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(99,32,255,0.2) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(0,220,180,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Main layout ── */
    #ui {
      position: fixed;
      inset: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      padding: 8px 10px;
    }

    /* Title */
    #title-area { text-align: center; flex-shrink: 0; }
    #title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 7vw, 2.6rem);
      letter-spacing: 8px;
      background: linear-gradient(135deg, #00ffc6, #7b2fff, #ff2d78);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titlePulse 3s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(123,47,255,0.6)); }
      50%      { filter: drop-shadow(0 0 24px rgba(0,255,198,0.8)); }
    }
    .subtitle {
      font-size: clamp(0.5rem, 2vw, 0.65rem);
      letter-spacing: 4px;
      color: rgba(255,255,255,0.25);
      margin-top: 2px;
    }

    /* Scores */
    #scores { display: flex; gap: 12px; flex-shrink: 0; }
    .scard {
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 5px 20px;
      min-width: 90px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .scard:first-child { border: 1px solid rgba(0,255,198,0.35); }
    .scard:last-child  { border: 1px solid rgba(123,47,255,0.35); }
    .slabel { font-size: clamp(0.5rem, 2vw, 0.6rem); letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .sval   { font-size: clamp(1.1rem, 5vw, 1.6rem); font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.2; }
    #score-display { color: #00ffc6; }
    #best-display  { color: #c77dff; }
    .score-pop { animation: pop 0.3s ease; }
    @keyframes pop { 40% { transform: scale(1.4); } }

    /* Canvas — square, takes available space */
    #canvas-area {
      flex-shrink: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Limit to square fitting in the viewport width */
      width: min(100vw - 20px, 55dvh);
      height: min(100vw - 20px, 55dvh);
    }

    #canvas-wrap {
      border-radius: 14px;
      padding: 3px;
      background: linear-gradient(135deg, #00ffc6, #7b2fff, #ff2d78, #00ffc6);
      background-size: 300% 300%;
      animation: borderSpin 4s linear infinite;
      box-shadow: 0 0 30px rgba(123,47,255,0.5), 0 0 60px rgba(0,255,198,0.1);
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes borderSpin {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    canvas { display: block; border-radius: 12px; }

    /* D-pad */
    #dpad {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 5px;
    }
    @media (hover: hover) and (pointer: fine) {
      /* Desktop: hide dpad */
      #dpad { display: none; }
    }
    .db {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .db:active { background: rgba(0,255,198,0.3); border-color: #00ffc6; }
    .de { background: transparent; border: none !important; }

    /* Leaderboard */
    #leaderboard {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(0,255,198,0.2);
      border-radius: 16px;
      padding: 14px 12px;
      width: 110px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    /* Hide leaderboard on narrow screens — show inside game instead */
    @media (max-width: 600px) {
      #leaderboard { display: none; }
    }
    .lb-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: #00ffc6;
      text-align: center;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 4px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      font-family: -apple-system, sans-serif;
    }
    .lb-row:first-of-type { background: rgba(0,255,198,0.08); }
    .lb-rank { color: rgba(255,255,255,0.3); font-size: 0.65rem; width: 16px; }
    .lb-name { flex: 1; padding: 0 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { color: #00ffc6; font-weight: 700; font-variant-numeric: tabular-nums; }
    .lb-row.gold   .lb-rank { color: #ffd700; }
    .lb-row.silver .lb-rank { color: #c0c0c0; }
    .lb-row.bronze .lb-rank { color: #cd7f32; }
    .lb-empty { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.65rem; margin-top: 8px; }

    /* Leaderboard popup */
    #lb-popup {
      position: fixed;
      inset: 0;
      background: rgba(5,5,16,0.88);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    #lb-popup-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,198,0.3);
      border-radius: 20px;
      padding: 24px 20px;
      width: 80vw;
      max-width: 320px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 40px rgba(0,255,198,0.15);
    }

    #lb-popup-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      letter-spacing: 4px;
      color: #00ffc6;
      text-align: center;
      margin-bottom: 18px;
    }

    #lb-popup-list .lb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.04);
    }
    #lb-popup-list .lb-row.gold   { background: rgba(255,215,0,0.08); }
    #lb-popup-list .lb-row.silver { background: rgba(192,192,192,0.08); }
    #lb-popup-list .lb-row.bronze { background: rgba(205,127,50,0.08); }
    #lb-popup-list .lb-rank { width: 24px; font-size: 1rem; }
    #lb-popup-list .lb-name { flex: 1; padding: 0 8px; }
    #lb-popup-list .lb-score { color: #00ffc6; font-weight: 700; font-size: 1rem; }
    #lb-popup-list .lb-empty { text-align: center; color: rgba(255,255,255,0.3); padding: 12px 0; }

    #lb-popup-close {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00ffc6, #7b2fff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #lb-popup-close:active { opacity: 0.8; }

    /* Stars */
    .star {
      position: fixed; width: 2px; height: 2px;
      background: white; border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: var(--o); pointer-events: none;
    }
    @keyframes twinkle { to { opacity: 0.04; } }
  </style>
</head>
<body>

<!-- Leaderboard popup (mobile) -->
<div id="lb-popup" style="display:none">
  <div id="lb-popup-box">
    <div id="lb-popup-title">🏆 Leaderboard</div>
    <div id="lb-popup-list"></div>
    <button id="lb-popup-close">PLAY AGAIN</button>
  </div>
</div>

<!-- Leaderboard (desktop left side) -->
<div id="leaderboard">
  <div class="lb-title">🏆 Top 5</div>
  <div id="lb-list"><div class="lb-empty">No scores yet</div></div>
</div>

<div id="ui">
  <div id="title-area">
    <div id="title">SHADI SNAKE</div>
    <div class="subtitle">arcade classic</div>
  </div>

  <div id="scores">
    <div class="scard">
      <div class="slabel">Score</div>
      <div class="sval" id="score-display">0</div>
    </div>
    <div class="scard">
      <div class="slabel">Best</div>
      <div class="sval" id="best-display">0</div>
    </div>
  </div>

  <div id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <div id="dpad">
    <div class="de"></div><div class="db" id="btn-up">▲</div><div class="de"></div>
    <div class="db" id="btn-left">◀</div><div class="de"></div><div class="db" id="btn-right">▶</div>
    <div class="de"></div><div class="db" id="btn-down">▼</div><div class="de"></div>
  </div>
</div>

<script>
  // Stars
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o:${0.15+Math.random()*0.5}`;
    document.body.appendChild(s);
  }

  // Size the canvas to exactly fit #canvas-area
  const COLS = 20, ROWS = 20;
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let CELL;

  function sizeCanvas() {
    const area = document.getElementById('canvas-area');
    const s = Math.floor(Math.min(area.clientWidth, area.clientHeight) / COLS) * COLS;
    CELL = s / COLS;
    canvas.width = s;
    canvas.height = s;
  }

  // Wait for layout then size
  requestAnimationFrame(() => {
    sizeCanvas();
    drawOverlay('SNAKE', '#00ffc6', null);
  });
  window.addEventListener('resize', () => { sizeCanvas(); redraw(); });

  // Game
  let snake, dir, nextDir, food, score, best = 0, gameLoop, state = 'start';
  let particles = [], eatAnim = 0;

  const SPEED_START = 220, SPEED_MIN = 65, SPEED_STEP = 8;
  function getSpeed() { return Math.max(SPEED_MIN, SPEED_START - score * SPEED_STEP); }
  function restartLoop() { clearInterval(gameLoop); gameLoop = setInterval(update, getSpeed()); }

  function spawnParticles(gx, gy) {
    const cx = gx*CELL+CELL/2, cy = gy*CELL+CELL/2;
    ['#ff2d78','#00ffc6','#c77dff','#ffcc00'].forEach(color => {
      for (let i = 0; i < 4; i++) {
        const a = Math.random()*Math.PI*2, sp = 1.5+Math.random()*3;
        particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
          life:1,decay:0.05+Math.random()*0.04,r:1.5+Math.random()*2,color});
      }
    });
  }
  function tickParticles() {
    particles = particles.filter(p=>p.life>0);
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.life-=p.decay;});
  }
  function drawParticles() {
    particles.forEach(p=>{
      ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    });
  }

  function init() {
    const mx=Math.floor(COLS/2), my=Math.floor(ROWS/2);
    snake=[{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
    dir=nextDir={x:1,y:0}; score=0; particles=[]; eatAnim=0;
    placeFood(); updateUI();
  }
  function placeFood() {
    let p;
    do { p={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
    while(snake.some(s=>s.x===p.x&&s.y===p.y));
    food=p;
  }

  function update() {
    dir=nextDir;
    const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){
      endGame(); return;
    }
    snake.unshift(head);
    if(head.x===food.x&&head.y===food.y){
      score++; if(score>best)best=score;
      eatAnim=8; spawnParticles(food.x,food.y);
      updateUI(); placeFood(); restartLoop();
    } else snake.pop();
    tickParticles(); draw();
    if(eatAnim>0)eatAnim--;
  }

  function draw() {
    const S = canvas.width;
    ctx.fillStyle='#07071a'; ctx.fillRect(0,0,S,S);
    ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=0.5;
    for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,S);ctx.stroke();}
    for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(S,y*CELL);ctx.stroke();}

    // Food
    const t=Date.now()/600;
    const fx=food.x*CELL+CELL/2, fy=food.y*CELL+CELL/2, fr=(CELL/2-2)*(1+0.14*Math.sin(t));
    ctx.save(); ctx.shadowBlur=18; ctx.shadowColor='#ff2d78';
    const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,fr);
    fg.addColorStop(0,'#fff'); fg.addColorStop(0.3,'#ff6fa8'); fg.addColorStop(1,'#ff2d78');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2); ctx.fill(); ctx.restore();

    // Snake
    snake.forEach((seg,i)=>{
      const x=seg.x*CELL+1, y=seg.y*CELL+1, w=CELL-2, h=CELL-2;
      const t=i/snake.length;
      const r=Math.round(t*123), g=Math.round(255-t*130), b=Math.round(198+t*57);
      ctx.save();
      ctx.shadowBlur=i===0?(eatAnim>0?22:12):4;
      ctx.shadowColor=i===0?(eatAnim>0?'#ffcc00':'#00ffc6'):`rgb(${r},${g},${b})`;
      const grd=ctx.createLinearGradient(x,y,x+w,y+h);
      if(i===0){grd.addColorStop(0,'#e0fff8');grd.addColorStop(1,'#00ffc6');}
      else{grd.addColorStop(0,`rgb(${r},${g},${b})`);grd.addColorStop(1,`rgb(${Math.round(r*.6)},${Math.round(g*.6)},${Math.round(b*.6)})`);}
      ctx.fillStyle=grd; ctx.beginPath(); ctx.roundRect(x,y,w,h,i===0?6:4); ctx.fill(); ctx.restore();
    });

    // Eyes
    const hx=snake[0].x*CELL, hy=snake[0].y*CELL;
    const em={'1,0':[[13,5],[13,14]],'-1,0':[[5,5],[5,14]],'0,-1':[[5,5],[13,5]],'0,1':[[5,14],[13,14]]};
    (em[`${dir.x},${dir.y}`]||[[13,5],[13,14]]).forEach(([ex,ey])=>{
      ctx.fillStyle='#05050f'; ctx.beginPath(); ctx.arc(hx+ex,hy+ey,2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(hx+ex+.7,hy+ey-.7,1,0,Math.PI*2); ctx.fill();
    });
    drawParticles();
  }

  function drawOverlay(title, color, sub) {
    const S=canvas.width, cx=S/2, cy=S/2;
    ctx.fillStyle='rgba(5,5,16,0.82)'; ctx.fillRect(0,0,S,S);
    ctx.save(); ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(cx-120,cy-65,240,130,16); ctx.fill(); ctx.stroke(); ctx.restore();
    ctx.textAlign='center';
    const fs=Math.round(CELL*1.4);
    ctx.font=`bold ${fs}px Orbitron,sans-serif`;
    ctx.fillStyle=color; ctx.shadowBlur=18; ctx.shadowColor=color;
    ctx.fillText(title,cx,cy-12); ctx.shadowBlur=0;
    if(sub){ctx.font=`${Math.round(CELL*.68)}px -apple-system,sans-serif`;ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText(sub,cx,cy+16);}
    ctx.font=`${Math.round(CELL*.58)}px -apple-system,sans-serif`;
    ctx.fillStyle='rgba(0,255,198,0.6)';
    ctx.fillText(('ontouchstart' in window)?'TAP TO PLAY':'PRESS SPACE',cx,cy+46);
  }

  function redraw() {
    if(state==='playing') draw();
    else if(state==='over'){draw();drawOverlay('GAME OVER','#ff2d78',`Score: ${score}`);}
    else drawOverlay('SNAKE','#00ffc6',null);
  }

  // ── Supabase Leaderboard ──────────────────────────────────────
  const SB_URL = 'https://aleaozvtixxktwyafmdy.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFsZWFvenZ0aXh4a3R3eWFmbWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjQ3NTUsImV4cCI6MjA5NjM0MDc1NX0.O2BfQzGacytH8KJUuJSF8_h8KOF0VaGGkzxGVuCGWFg';

  async function fetchScores() {
    try {
      const res = await fetch(`${SB_URL}/rest/v1/scores?select=name,score&order=score.desc&limit=5`, {
        headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }
      });
      return await res.json();
    } catch { return []; }
  }

  async function saveScore(playerName, s) {
    try {
      await fetch(`${SB_URL}/rest/v1/scores`, {
        method: 'POST',
        headers: {
          apikey: SB_KEY,
          Authorization: `Bearer ${SB_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({ name: playerName, score: s })
      });
    } catch {}
  }

  const medals = ['gold','silver','bronze','',''];
  const icons  = ['🥇','🥈','🥉','4.','5.'];

  function renderRows(scores, listEl) {
    listEl.innerHTML = scores.length
      ? scores.map((s,i) => `
          <div class="lb-row ${medals[i]}">
            <span class="lb-rank">${icons[i]}</span>
            <span class="lb-name">${s.name}</span>
            <span class="lb-score">${s.score}</span>
          </div>`).join('')
      : '<div class="lb-empty">No scores yet</div>';
  }

  async function renderLeaderboard() {
    const list = document.getElementById('lb-list');
    list.innerHTML = '<div class="lb-empty">Loading...</div>';
    const scores = await fetchScores();
    renderRows(scores, list);
  }
  renderLeaderboard();

  async function showLbPopup() {
    const listEl = document.getElementById('lb-popup-list');
    listEl.innerHTML = '<div class="lb-empty">Loading...</div>';
    document.getElementById('lb-popup').style.display = 'flex';
    const scores = await fetchScores();
    renderRows(scores, listEl);
  }

  // Ask player name then save score
  async function handleEndGame() {
    let playerName = prompt('Game Over! Enter your name for the leaderboard:');
    if (!playerName || !playerName.trim()) playerName = 'Anonymous';
    playerName = playerName.trim().slice(0, 12);
    await saveScore(playerName, score);
    renderLeaderboard();
    if ('ontouchstart' in window) showLbPopup();
  }

  document.getElementById('lb-popup-close').addEventListener('click', () => {
    document.getElementById('lb-popup').style.display = 'none';
    startGame();
  });

  function startGame() { init(); state='playing'; restartLoop(); draw(); }
  function endGame() {
    clearInterval(gameLoop); state='over';
    draw(); drawOverlay('GAME OVER','#ff2d78',`Score: ${score}`); updateUI();
    if (score > 0) setTimeout(handleEndGame, 600);
  }

  function updateUI() {
    const sc=document.getElementById('score-display'), bc=document.getElementById('best-display');
    sc.textContent=score; bc.textContent=best;
    sc.classList.remove('score-pop'); void sc.offsetWidth; sc.classList.add('score-pop');
  }

  document.addEventListener('keydown', e=>{
    if((e.code==='Space'||e.code==='Enter')&&state!=='playing'){startGame();return;}
    if(e.code==='Escape'&&state==='playing'){clearInterval(gameLoop);state='paused';draw();drawOverlay('PAUSED','#c77dff',null);return;}
    if(state!=='playing')return;
    const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
      w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0},
      W:{x:0,y:-1},S:{x:0,y:1},A:{x:-1,y:0},D:{x:1,y:0}};
    const nd=m[e.key];
    if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y))nextDir=nd;
  });

  function tryDir(dx,dy){
    if(state!=='playing'){startGame();return;}
    if(dx===1&&dir.x!==-1)nextDir={x:1,y:0};
    else if(dx===-1&&dir.x!==1)nextDir={x:-1,y:0};
    else if(dy===-1&&dir.y!==1)nextDir={x:0,y:-1};
    else if(dy===1&&dir.y!==-1)nextDir={x:0,y:1};
  }

  [{id:'btn-up',dx:0,dy:-1},{id:'btn-down',dx:0,dy:1},{id:'btn-left',dx:-1,dy:0},{id:'btn-right',dx:1,dy:0}]
    .forEach(({id,dx,dy})=>{
      document.getElementById(id).addEventListener('touchstart',e=>{e.preventDefault();tryDir(dx,dy);},{passive:false});
      document.getElementById(id).addEventListener('mousedown',()=>tryDir(dx,dy));
    });

  canvas.addEventListener('touchstart',e=>{e.preventDefault();if(state!=='playing')startGame();},{passive:false});
  canvas.addEventListener('click',()=>{if(state!=='playing')startGame();});

  let t0=null;
  canvas.addEventListener('touchstart',e=>{t0=e.touches[0];},{passive:true});
  canvas.addEventListener('touchend',e=>{
    if(!t0||state!=='playing')return;
    const dx=e.changedTouches[0].clientX-t0.clientX, dy=e.changedTouches[0].clientY-t0.clientY;
    if(Math.abs(dx)>Math.abs(dy))tryDir(dx>20?1:-1,0);
    else tryDir(0,dy>20?1:-1);
  },{passive:true});

  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
