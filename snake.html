<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snake">
  <meta name="theme-color" content="#00ffc6">
  <link rel="manifest" href="manifest.json">
  <title>Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(99, 32, 255, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at 80% 80%, rgba(0, 220, 180, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255, 50, 100, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: var(--o);
    }

    @keyframes twinkle {
      from { opacity: var(--o); transform: scale(1); }
      to   { opacity: 0.1;     transform: scale(0.5); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 12px 10px;
      gap: 0;
    }

    /* Title */
    .title-area {
      text-align: center;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(1.4rem, 6vw, 2.8rem);
      letter-spacing: 8px;
      background: linear-gradient(135deg, #00ffc6, #7b2fff, #ff2d78);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(123, 47, 255, 0.5));
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(123,47,255,0.5)); }
      50%       { filter: drop-shadow(0 0 35px rgba(0,255,198,0.7)); }
    }

    .subtitle {
      font-size: clamp(0.5rem, 2vw, 0.7rem);
      letter-spacing: 5px;
      color: rgba(255,255,255,0.3);
      font-family: 'Orbitron', monospace;
      margin-top: 2px;
    }

    /* Score panel */
    .score-panel {
      display: flex;
      gap: 14px;
      margin-bottom: 10px;
    }

    .score-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 6px 20px;
      text-align: center;
      min-width: 90px;
    }

    .score-card:first-child { border-color: rgba(0,255,198,0.25); }
    .score-card:last-child  { border-color: rgba(123,47,255,0.25); }

    .score-label {
      font-size: clamp(0.5rem, 2vw, 0.65rem);
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      font-family: 'Orbitron', monospace;
    }

    .score-value {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      line-height: 1.2;
    }

    #score-display { color: #00ffc6; text-shadow: 0 0 12px rgba(0,255,198,0.6); }
    #best-display  { color: #c77dff; text-shadow: 0 0 12px rgba(199,125,255,0.6); }

    /* Canvas wrapper — fills remaining space */
    .canvas-wrapper {
      position: relative;
      border-radius: 16px;
      padding: 3px;
      background: linear-gradient(135deg, #00ffc6, #7b2fff, #ff2d78, #00ffc6);
      background-size: 300% 300%;
      animation: borderSpin 4s linear infinite;
      box-shadow: 0 0 40px rgba(123,47,255,0.4), 0 0 80px rgba(0,255,198,0.15);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
    }

    @keyframes borderSpin {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    canvas {
      display: block;
      border-radius: 14px;
    }

    /* Hint */
    .hint {
      margin-top: 10px;
      font-size: clamp(0.55rem, 2vw, 0.75rem);
      color: rgba(255,255,255,0.25);
      letter-spacing: 2px;
      font-family: 'Orbitron', monospace;
      text-align: center;
    }

    .hint b { color: rgba(0,255,198,0.6); font-weight: 600; }

    /* D-pad for mobile */
    .dpad {
      display: none;
      margin-top: 12px;
      gap: 4px;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
    }

    @media (pointer: coarse) {
      .dpad { display: grid; }
    }

    .dpad-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      active-background: rgba(0,255,198,0.2);
    }

    .dpad-btn:active { background: rgba(0,255,198,0.2); }
    .dpad-btn.center { background: transparent; border: none; }

    /* Score pop animation */
    .score-pop {
      animation: scorePop 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    @keyframes scorePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.45); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrapper">
  <div class="title-area">
    <h1>SNAKE</h1>
    <div class="subtitle">arcade classic</div>
  </div>

  <div class="score-panel">
    <div class="score-card">
      <div class="score-label">Score</div>
      <div class="score-value" id="score-display">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Best</div>
      <div class="score-value" id="best-display">0</div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="canvas" width="420" height="420"></canvas>
  </div>

  <div class="hint" id="hint">Tap screen to start</div>

  <div class="dpad">
    <div></div>
    <button class="dpad-btn" id="btn-up">▲</button>
    <div></div>
    <button class="dpad-btn" id="btn-left">◀</button>
    <div class="dpad-btn center"></div>
    <button class="dpad-btn" id="btn-right">▶</button>
    <div></div>
    <button class="dpad-btn" id="btn-down">▼</button>
    <div></div>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--o:${0.2+Math.random()*0.6}`;
    starsEl.appendChild(s);
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  let CELL, COLS, ROWS, OX, OY;

  function resizeCanvas() {
    const wrapper = document.querySelector('.canvas-wrapper');
    const dpad = document.querySelector('.dpad');
    const dpadH = dpad.offsetHeight > 0 ? dpad.offsetHeight + 12 : 0;
    const maxW = wrapper.clientWidth - 6;
    const maxH = wrapper.clientHeight - 6;
    const size = Math.min(maxW, maxH);
    CELL = Math.floor(size / 20);
    COLS = 20;
    ROWS = 20;
    canvas.width  = COLS * CELL;
    canvas.height = ROWS * CELL;
    OX = 0;
    OY = 0;
  }

  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); draw(); });

  let snake, dir, nextDir, food, score, best = 0, gameLoop, state;
  let particles = [];
  let eatAnim = 0;

  const SPEED_START = 220;   // ms per tick at score 0 (slow)
  const SPEED_MIN   = 60;    // ms per tick cap (max speed)
  const SPEED_STEP  = 8;     // ms reduction per food eaten

  function getSpeed() {
    return Math.max(SPEED_MIN, SPEED_START - score * SPEED_STEP);
  }

  function restartLoop() {
    clearInterval(gameLoop);
    gameLoop = setInterval(update, getSpeed());
  }

  // ── Particle system ──────────────────────────────────────────
  function spawnParticles(gx, gy) {
    const cx = OX + gx * CELL + CELL / 2;
    const cy = OY + gy * CELL + CELL / 2;
    const colors = ['#ff2d78','#00ffc6','#c77dff','#ffcc00','#fff'];
    for (let i = 0; i < 18; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.04 + Math.random() * 0.04,
        r: 2 + Math.random() * 3,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.life -= p.decay;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 8;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // ── Game logic ───────────────────────────────────────────────
  function init() {
    const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
    snake = [
      { x: mx,   y: my },
      { x: mx-1, y: my },
      { x: mx-2, y: my },
    ];
    dir = nextDir = { x: 1, y: 0 };
    score = 0;
    particles = [];
    eatAnim = 0;
    placeFood();
    updateScoreUI();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function update() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame(); return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      if (score > best) best = score;
      eatAnim = 8;
      spawnParticles(food.x, food.y);
      updateScoreUI();
      placeFood();
      restartLoop();
    } else {
      snake.pop();
    }

    updateParticles();
    draw();
    if (eatAnim > 0) eatAnim--;
  }

  // ── Drawing ──────────────────────────────────────────────────
  function draw() {
    // Background
    ctx.fillStyle = '#07071a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(OX + x * CELL, OY);
      ctx.lineTo(OX + x * CELL, OY + ROWS * CELL);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(OX, OY + y * CELL);
      ctx.lineTo(OX + COLS * CELL, OY + y * CELL);
      ctx.stroke();
    }

    drawFood();
    drawSnake();
    drawParticles();
  }

  function drawFood() {
    const t = Date.now() / 600;
    const fx = OX + food.x * CELL + CELL / 2;
    const fy = OY + food.y * CELL + CELL / 2;
    const pulse = 1 + 0.18 * Math.sin(t);
    const r = (CELL / 2 - 3) * pulse;

    // Outer glow
    ctx.save();
    ctx.shadowBlur = 22;
    ctx.shadowColor = '#ff2d78';
    const grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#ff6fa8');
    grad.addColorStop(1, '#ff2d78');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(fx, fy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSnake() {
    const len = snake.length;
    snake.forEach((seg, i) => {
      const x = OX + seg.x * CELL + 1;
      const y = OY + seg.y * CELL + 1;
      const w = CELL - 2;
      const h = CELL - 2;
      const t = i / len;

      // Color: head = cyan, tail = purple
      const r = Math.round(0   + t * 123);
      const g = Math.round(255 - t * 130);
      const b = Math.round(198 + t * 57);

      ctx.save();
      if (i === 0) {
        // Head glow
        ctx.shadowBlur = 18 + (eatAnim > 0 ? 14 : 0);
        ctx.shadowColor = eatAnim > 0 ? '#ffcc00' : '#00ffc6';
      } else {
        ctx.shadowBlur = 6;
        ctx.shadowColor = `rgb(${r},${g},${b})`;
      }

      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      if (i === 0) {
        grad.addColorStop(0, '#e0fff8');
        grad.addColorStop(1, '#00ffc6');
      } else {
        grad.addColorStop(0, `rgb(${r},${g},${b})`);
        grad.addColorStop(1, `rgb(${Math.round(r*0.6)},${Math.round(g*0.6)},${Math.round(b*0.6)})`);
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, i === 0 ? 7 : 5);
      ctx.fill();
      ctx.restore();
    });

    // Eyes
    if (snake.length > 0) {
      const hx = OX + snake[0].x * CELL;
      const hy = OY + snake[0].y * CELL;
      ctx.fillStyle = '#05050f';
      const eyeOffsets = {
        '1,0':  [[13, 5],[13,14]],
        '-1,0': [[5, 5],[5, 14]],
        '0,-1': [[5, 5],[13, 5]],
        '0,1':  [[5,14],[13,14]],
      };
      const key = `${dir.x},${dir.y}`;
      const eyes = eyeOffsets[key] || [[13,5],[13,14]];
      eyes.forEach(([ex, ey]) => {
        ctx.beginPath();
        ctx.arc(hx + ex, hy + ey, 2.8, 0, Math.PI * 2);
        ctx.fill();
        // White glint
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.arc(hx + ex + 0.8, hy + ey - 0.8, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#05050f';
      });
    }
  }

  function drawOverlay(title, titleColor, sub) {
    // Dim
    ctx.fillStyle = 'rgba(5,5,16,0.78)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Card
    const cx = canvas.width / 2, cy = canvas.height / 2;
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(cx - 150, cy - 80, 300, 160, 20);
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    ctx.textAlign = 'center';
    ctx.font = 'bold 2rem Orbitron, monospace';
    ctx.fillStyle = titleColor;
    ctx.shadowBlur = 20;
    ctx.shadowColor = titleColor;
    ctx.fillText(title, cx, cy - 20);
    ctx.shadowBlur = 0;

    if (sub) {
      ctx.font = '0.85rem Inter, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillText(sub, cx, cy + 20);
    }

    ctx.font = '0.65rem Orbitron, monospace';
    ctx.fillStyle = 'rgba(0,255,198,0.5)';
    ctx.letterSpacing = '3px';
    ctx.fillText('PRESS SPACE TO CONTINUE', cx, cy + 56);
  }

  function startGame() {
    init();
    state = 'playing';
    document.getElementById('hint').innerHTML = 'Arrow keys or <b>WASD</b> · <b>ESC</b> to pause';
    clearInterval(gameLoop);
    gameLoop = setInterval(update, getSpeed());
    draw();
  }

  function endGame() {
    clearInterval(gameLoop);
    state = 'over';
    draw();
    drawOverlay('GAME OVER', '#ff2d78', `You scored ${score} point${score !== 1 ? 's' : ''}`);
    updateScoreUI();
  }

  function updateScoreUI() {
    const sc = document.getElementById('score-display');
    const bc = document.getElementById('best-display');
    sc.textContent = score;
    bc.textContent = best;
    sc.classList.remove('score-pop');
    void sc.offsetWidth;
    sc.classList.add('score-pop');
  }

  // ── Input ────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
      if (state !== 'playing') { startGame(); return; }
    }
    if (e.code === 'Escape' && state === 'playing') {
      clearInterval(gameLoop);
      state = 'paused';
      draw();
      drawOverlay('PAUSED', '#c77dff', null);
      return;
    }
    if (state !== 'playing') return;
    switch (e.key) {
      case 'ArrowUp':    case 'w': case 'W': if (dir.y !==  1) nextDir = { x:  0, y: -1 }; break;
      case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = { x:  0, y:  1 }; break;
      case 'ArrowLeft':  case 'a': case 'A': if (dir.x !==  1) nextDir = { x: -1, y:  0 }; break;
      case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = { x:  1, y:  0 }; break;
    }
  });

  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
  canvas.addEventListener('touchend', e => {
    if (state !== 'playing') { startGame(); return; }
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (dx > 20 && dir.x !== -1) nextDir = { x: 1, y: 0 };
      else if (dx < -20 && dir.x !== 1) nextDir = { x: -1, y: 0 };
    } else {
      if (dy > 20 && dir.y !== -1) nextDir = { x: 0, y: 1 };
      else if (dy < -20 && dir.y !== 1) nextDir = { x: 0, y: -1 };
    }
  }, { passive: true });

  // ── D-pad buttons ────────────────────────────────────────────
  function tryDir(dx, dy) {
    if (state !== 'playing') { startGame(); return; }
    if (dx === 1  && dir.x !== -1) nextDir = { x: 1,  y: 0  };
    if (dx === -1 && dir.x !== 1)  nextDir = { x: -1, y: 0  };
    if (dy === -1 && dir.y !== 1)  nextDir = { x: 0,  y: -1 };
    if (dy === 1  && dir.y !== -1) nextDir = { x: 0,  y: 1  };
  }

  document.getElementById('btn-up').addEventListener('touchstart',    e => { e.preventDefault(); tryDir(0,-1); }, { passive: false });
  document.getElementById('btn-down').addEventListener('touchstart',  e => { e.preventDefault(); tryDir(0, 1); }, { passive: false });
  document.getElementById('btn-left').addEventListener('touchstart',  e => { e.preventDefault(); tryDir(-1,0); }, { passive: false });
  document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); tryDir(1, 0); }, { passive: false });

  // tap canvas to start
  canvas.addEventListener('touchstart', e => {
    if (state !== 'playing') { e.preventDefault(); startGame(); }
  }, { passive: false });

  // ── Service Worker ───────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  // ── Boot ─────────────────────────────────────────────────────
  state = 'start';
  ctx.fillStyle = '#07071a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawOverlay('SNAKE', '#00ffc6', null);
</script>
</body>
</html>
